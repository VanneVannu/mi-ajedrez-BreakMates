
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BreakMates</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2">
  <link rel="stylesheet" href="style.css">
</head>
<body>

      <!-- ACTUALIZADO: Interfaz de control con selector de bando -->
  <div id="interfaz">
    <div id="marcador-turno">Turno: <span id="bando-actual">BLANCAS</span></div>
    
     <!-- NUEVO: Campo para escribir el Apodo -->
    <div class="control-grupo">
       <label for="entrada-apodo">TU APODO:</label>
       <input type="text" id="entrada-apodo" placeholder="Jugador Anónimo" value="Anónimo" maxlength="15" autocomplete="off">
    </div>

    <div>
      <label for="selector-bando" style="font-weight: bold; margin-right: 5px;">Tu Bando:</label>
      <select id="selector-bando">
        <option value="espectador">Espectador</option>
        <option value="blancas">Blancas (♙)</option>
        <option value="negras">Negras (♟)</option>
      </select>
    </div>

    <button id="btn-reiniciar">Reiniciar Partida</button>
  </div>

  <div id="zona-juego">

    <!-- Lado izquierdo: Piezas blancas capturadas -->
    <div class="cementerio" id="capturadas-blancas"></div>

    <!-- Contenedor relativo para poder encimar el letrero -->
    <div id="contenedor-tablero">
      <div id="tablero">
        <!-- Fila 0 (Negras) -->
        <div class="casilla" data-fila="0" data-col="0">♜</div><div class="casilla" data-fila="0" data-col="1">♞</div><div class="casilla" data-fila="0" data-col="2">♝</div><div class="casilla" data-fila="0" data-col="3">♛</div>
        <div class="casilla" data-fila="0" data-col="4">♚</div><div class="casilla" data-fila="0" data-col="5">♝</div><div class="casilla" data-fila="0" data-col="6">♞</div><div class="casilla" data-fila="0" data-col="7">♜</div>
        <!-- Fila 1 (Peones Negros) -->
        <div class="casilla" data-fila="1" data-col="0">♟</div><div class="casilla" data-fila="1" data-col="1">♟</div><div class="casilla" data-fila="1" data-col="2">♟</div><div class="casilla" data-fila="1" data-col="3">♟</div>
        <div class="casilla" data-fila="1" data-col="4">♟</div><div class="casilla" data-fila="1" data-col="5">♟</div><div class="casilla" data-fila="1" data-col="6">♟</div><div class="casilla" data-fila="1" data-col="7">♟</div>
        
        <!-- Filas vacías -->
        <div class="casilla" data-fila="2" data-col="0"></div><div class="casilla" data-fila="2" data-col="1"></div><div class="casilla" data-fila="2" data-col="2"></div><div class="casilla" data-fila="2" data-col="3"></div><div class="casilla" data-fila="2" data-col="4"></div><div class="casilla" data-fila="2" data-col="5"></div><div class="casilla" data-fila="2" data-col="6"></div><div class="casilla" data-fila="2" data-col="7"></div>
        <div class="casilla" data-fila="3" data-col="0"></div><div class="casilla" data-fila="3" data-col="1"></div><div class="casilla" data-fila="3" data-col="2"></div><div class="casilla" data-fila="3" data-col="3"></div><div class="casilla" data-fila="3" data-col="4"></div><div class="casilla" data-fila="3" data-col="5"></div><div class="casilla" data-fila="3" data-col="6"></div><div class="casilla" data-fila="3" data-col="7"></div>
        <div class="casilla" data-fila="4" data-col="0"></div><div class="casilla" data-fila="4" data-col="1"></div><div class="casilla" data-fila="4" data-col="2"></div><div class="casilla" data-fila="4" data-col="3"></div><div class="casilla" data-fila="4" data-col="4"></div><div class="casilla" data-fila="4" data-col="5"></div><div class="casilla" data-fila="4" data-col="6"></div><div class="casilla" data-fila="4" data-col="7"></div>
        <div class="casilla" data-fila="5" data-col="0"></div><div class="casilla" data-fila="5" data-col="1"></div><div class="casilla" data-fila="5" data-col="2"></div><div class="casilla" data-fila="5" data-col="3"></div><div class="casilla" data-fila="5" data-col="4"></div><div class="casilla" data-fila="5" data-col="5"></div><div class="casilla" data-fila="5" data-col="6"></div><div class="casilla" data-fila="5" data-col="7"></div>

        <!-- Fila 6 (Peones Blancos) -->
        <div class="casilla" data-fila="6" data-col="0">♙</div><div class="casilla" data-fila="6" data-col="1">♙</div><div class="casilla" data-fila="6" data-col="2">♙</div><div class="casilla" data-fila="6" data-col="3">♙</div>
        <div class="casilla" data-fila="6" data-col="4">♙</div><div class="casilla" data-fila="6" data-col="5">♙</div><div class="casilla" data-fila="6" data-col="6">♙</div><div class="casilla" data-fila="6" data-col="7">♙</div>
        <!-- Fila 7 (Blancas) -->
        <div class="casilla" data-fila="7" data-col="0">♖</div><div class="casilla" data-fila="7" data-col="1">♘</div><div class="casilla" data-fila="7" data-col="2">♗</div><div class="casilla" data-fila="7" data-col="3">♕</div>
        <div class="casilla" data-fila="7" data-col="4">♔</div><div class="casilla" data-fila="7" data-col="5">♗</div><div class="casilla" data-fila="7" data-col="6">♘</div><div class="casilla" data-fila="7" data-col="7">♖</div>
      </div>

      <!-- NUEVO: Letrero flotante de Jaque Mate oculto por defecto -->
      <div id="pantalla-victoria" class="oculto">
        <h2>¡JAQUE MATE!</h2>
        <p id="mensaje-ganador">Ganaron las blancas</p>
      </div>
    </div>

    <!-- Lado derecho: Piezas negras capturadas -->
    <div class="cementerio" id="capturadas-negras"></div>

     <div id="contenedor-chat">
      <div id="titulo-chat">CHAT EN VIVO</div>
      <div id="mensajes-chat"></div>
      <div id="formulario-chat">
        <input type="text" id="entrada-mensaje" placeholder="Escribe un mensaje..." autocomplete="off">
        <button id="btn-enviar-chat">➤</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>

</body>
</html>
